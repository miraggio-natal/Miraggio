<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Cadastro</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: Arial, sans-serif; margin: 0; padding: 2rem; background: #0f172a; color: #f8fafc; }
      .card { max-width: 720px; margin: 0 auto; background: #111827; padding: 2rem; border-radius: 16px; }
      input, button { width: 100%; padding: 0.75rem; margin-top: 0.75rem; border-radius: 8px; border: 1px solid #334155; }
      button { background: #3b82f6; color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Portal Público de Cadastro</h1>
      <p>Cadastro simples via link/QR Code para colaboradores.</p>
      <form>
        <input type="text" placeholder="Nome completo" />
        <input type="email" placeholder="E-mail corporativo" />
        <input type="text" placeholder="Cargo" />
        <button type="submit">Enviar cadastro</button>
      </form>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal de Carreiras - Passo 1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f1f3f5; }
    .hero { background: #0e5c4a; color: white; padding: 2rem; text-align: center; }
    .card { max-width: 500px; margin: -40px auto; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="hero"><h2>Portal de Carreiras</h2></div>
  <div class="container">
    <div class="card">
      <form id="step1Form">
        <div class="mb-3"><label>Nome Completo</label><input type="text" name="nome" class="form-control" required></div>
        <div class="mb-3"><label>E-mail</label><input type="email" name="email" class="form-control" required></div>
        <button type="submit" class="btn btn-success w-100">Próxima Etapa</button>
        <div id="msg" class="mt-3"></div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://fluffy-dollop-qvvv9qj554gxfx7vg-8000.app.github.dev';
    
    document.getElementById('step1Form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgDiv = document.getElementById('msg');
      const d = new FormData(e.target);
      
      try {
        const res = await fetch(`${API_BASE_URL}/candidatos/`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({nome: d.get('nome'), email: d.get('email')})
        });

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({}));
          throw new Error(errorData.detail || `Erro: ${res.status}`);
        }

        const data = await res.json();
        window.location.href = `curriculo.html?id=${data.id}`;
      } catch (err) {
        msgDiv.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
